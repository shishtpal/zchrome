<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.6" />
    </filter>

    <!-- Chrome & Zig Gradient Definitions -->
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A80" />
      <stop offset="100%" stop-color="#E53935" />
    </linearGradient>
    
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#69F0AE" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
    
    <linearGradient id="gradYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE57F" />
      <stop offset="100%" stop-color="#F57F17" />
    </linearGradient>
    
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#82B1FF" />
      <stop offset="100%" stop-color="#1E88E5" />
    </linearGradient>
    
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <!-- Dark Space Background (Optional context, making the window pop) -->
  <rect width="512" height="512" fill="#010409" />

  <!-- Main Browser/Terminal Window -->
  <g filter="url(#shadow)">
    <!-- Window Body -->
    <rect x="32" y="48" width="448" height="416" rx="16" fill="#0D1117" stroke="#30363D" stroke-width="2" />
    
    <!-- Window Header -->
    <path d="M 32 64 A 16 16 0 0 1 48 48 L 464 48 A 16 16 0 0 1 480 64 L 480 96 L 32 96 Z" fill="#161B22" />
    <line x1="32" y1="96" x2="480" y2="96" stroke="#30363D" stroke-width="2" />
    
    <!-- Window Controls (Chrome colored) -->
    <circle cx="64" cy="72" r="6" fill="#FF5F56" />
    <circle cx="84" cy="72" r="6" fill="#FFBD2E" />
    <circle cx="104" cy="72" r="6" fill="#27C93F" />
    
    <!-- Address Bar -->
    <rect x="160" y="60" width="192" height="24" rx="12" fill="#010409" stroke="#30363D" stroke-width="1" />
    
    <!-- Lock Icon -->
    <path d="M 194 72 V 68 A 4 4 0 0 1 202 68 V 72 M 192 72 H 204 V 80 H 192 Z" fill="none" stroke="#8B949E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <text x="212" y="76" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" fill="#8B949E">cdp://zchrome</text>
  </g>

  <!-- Background Tech Grid / Automation Web -->
  <g opacity="0.4">
    <line x1="256" y1="96" x2="256" y2="464" stroke="#1E293B" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="32" y1="260" x2="480" y2="260" stroke="#1E293B" stroke-width="1" stroke-dasharray="4 4" />
    <circle cx="256" cy="260" r="140" stroke="#1E293B" stroke-width="1" fill="none" />
    <circle cx="256" cy="260" r="180" stroke="#1E293B" stroke-width="1" fill="none" stroke-dasharray="2 8" />
    <path d="M 256 190 A 70 70 0 0 1 326 260" fill="none" stroke="#30363D" stroke-width="4" stroke-linecap="round" />
    <path d="M 256 330 A 70 70 0 0 1 186 260" fill="none" stroke="#30363D" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- CDP Network Lines -->
  <line x1="336" y1="180" x2="400" y2="116" stroke="#30363D" stroke-width="2" stroke-dasharray="4 4" />
  <line x1="176" y1="340" x2="112" y2="404" stroke="#30363D" stroke-width="2" stroke-dasharray="4 4" />
  <circle cx="400" cy="116" r="4" fill="#30363D" />
  <circle cx="112" cy="404" r="4" fill="#30363D" />

  <!-- ZChrome Main Emblem -->
  <g>
    <!-- Outer Chrome Aperture Rings (Dasharray calculation for perfect 3-segment gaps) -->
    <!-- Red Blade (Top) -->
    <circle cx="256" cy="260" r="96" fill="none" stroke="url(#gradRed)" stroke-width="32" stroke-dasharray="160 443.2" transform="rotate(-137.7 256 260)" stroke-linecap="round" />
    <!-- Green Blade (Bottom Right) -->
    <circle cx="256" cy="260" r="96" fill="none" stroke="url(#gradGreen)" stroke-width="32" stroke-dasharray="160 443.2" transform="rotate(-17.7 256 260)" stroke-linecap="round" />
    <!-- Yellow Blade (Bottom Left) -->
    <circle cx="256" cy="260" r="96" fill="none" stroke="url(#gradYellow)" stroke-width="32" stroke-dasharray="160 443.2" transform="rotate(102.3 256 260)" stroke-linecap="round" />

    <!-- Central Chrome/CDP Lens -->
    <circle cx="256" cy="260" r="36" fill="url(#gradBlue)" />
    <circle cx="256" cy="260" r="28" fill="#0D1117" opacity="0.6" />
    <circle cx="256" cy="260" r="16" fill="url(#gradBlue)" />
    <circle cx="256" cy="260" r="48" fill="none" stroke="#4285F4" stroke-width="2" stroke-dasharray="4 8" opacity="0.5" />
  </g>

  <!-- The Zig "Z" / Data Stream -->
  <g>
    <!-- Z Tube Glowing Shadow -->
    <path d="M 156 160 L 356 160 L 156 360 L 356 360" fill="none" stroke="#FF8F00" stroke-width="32" stroke-linejoin="round" stroke-linecap="round" opacity="0.25" />
    
    <!-- Z Tube Main Body -->
    <path d="M 156 160 L 356 160 L 156 360 L 356 360" fill="none" stroke="url(#gradOrange)" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Z Tube Bright Core -->
    <path d="M 156 160 L 356 160 L 156 360 L 356 360" fill="none" stroke="#FFF3E0" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />

    <!-- Z Nodes (CDP Endpoints & Corners) -->
    <g stroke="url(#gradOrange)" stroke-width="3">
      <circle cx="156" cy="160" r="12" fill="#0D1117" />
      <circle cx="356" cy="360" r="12" fill="#0D1117" />
    </g>

    <!-- Glowing Data Packets along the Z stream -->
    <circle cx="156" cy="160" r="4" fill="#FFF" />
    <circle cx="356" cy="160" r="4" fill="#FFF" />
    <circle cx="156" cy="360" r="4" fill="#FFF" />
    <circle cx="356" cy="360" r="4" fill="#FFF" />
    <circle cx="306" cy="210" r="5" fill="#FFF" />
    <circle cx="256" cy="260" r="6" fill="#FFF" /> <!-- Intersects perfect center -->
    <circle cx="206" cy="310" r="5" fill="#FFF" />
  </g>

  <!-- Small Protocol Tags -->
  <text x="136" y="146" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" font-weight="bold" fill="#A0AEC0">CDP</text>
  <text x="360" y="380" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" font-weight="bold" fill="#A0AEC0">WSS</text>

  <!-- Bottom Terminal Command Area -->
  <g transform="translate(56, 440)">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="bold">
      <tspan fill="#F59E0B">❯ </tspan>
      <tspan fill="#60A5FA">zchrome</tspan>
      <tspan fill="#A0AEC0">.</tspan>
      <tspan fill="#69F0AE">launch</tspan>
      <tspan fill="#A0AEC0">({ </tspan>
      <tspan fill="#FF8A80">url</tspan>
      <tspan fill="#A0AEC0">: </tspan>
      <tspan fill="#FFE57F">"cdp://ws"</tspan>
      <tspan fill="#A0AEC0"> })</tspan>
      <tspan fill="#E53935">_</tspan>
    </text>
  </g>
</svg>